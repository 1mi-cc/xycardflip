services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: xyzw-uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3001}:3001"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 5
